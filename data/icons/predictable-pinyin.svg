<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Keyboard body -->
  <rect x="2" y="14" width="44" height="28" rx="3" ry="3"
        fill="#37474F" stroke="#263238" stroke-width="1.5"/>
  <!-- Key rows -->
  <rect x="6"  y="18" width="5" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="13" y="18" width="5" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="20" y="18" width="5" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="27" y="18" width="5" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="34" y="18" width="8" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="6"  y="24" width="7" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="15" y="24" width="5" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="22" y="24" width="5" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="29" y="24" width="5" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="36" y="24" width="6" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="6"  y="30" width="5" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="13" y="30" width="5" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="20" y="30" width="12" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="34" y="30" width="4" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="40" y="30" width="2" height="4" rx="0.8" fill="#546E7A"/>
  <rect x="6"  y="36" width="3" height="3" rx="0.6" fill="#546E7A"/>
  <rect x="11" y="36" width="26" height="3" rx="0.6" fill="#546E7A"/>
  <rect x="39" y="36" width="3" height="3" rx="0.6" fill="#546E7A"/>
  <!--
    ⚡ Lightning bolt — 6-point zigzag matching the Unicode HIGH VOLTAGE glyph.
    Top point (30,1) → down-left to jag-left (9,25) → right to jag-step (21,25)
    → down-left to bottom tip (15,47) → up-right to jag-right (39,21)
    → left to jag-step (27,21) → back to top.
  -->
  <polygon points="30,1 9,25 21,25 15,47 39,21 27,21"
           fill="#FFC107" stroke="#FF8F00" stroke-width="0.8"
           stroke-linejoin="round"/>
  <polygon points="29,4 13,24.5 22,24.5 17,43 36,21.5 27.5,21.5"
           fill="#FFECB3" opacity="0.4"/>
</svg>
